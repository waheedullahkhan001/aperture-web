<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Aperture</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="card bg-base-100 shadow-xl w-full max-w-sm">
    <div class="card-body">
      <h1 class="card-title text-2xl">Aperture</h1>
      <p class="text-sm opacity-70">Sign in to manage recordings, devices and alerts.</p>
      <form id="login-form" class="mt-2 space-y-3">
        <div>
          <label class="label" for="email">Email</label>
          <input id="email" name="email" type="email" class="input w-full" required autocomplete="email">
        </div>
        <div>
          <label class="label" for="password">Password</label>
          <input id="password" name="password" type="password" class="input w-full" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-full">Sign in</button>
      </form>
      <div class="mt-2 flex justify-between text-sm">
        <a class="link" href="register.html">Create account</a>
        <a class="link" href="forgot-password.html">Forgot password?</a>
      </div>
    </div>
  </div>
  <script type="module" src="js/login.js"></script>
</body>
</html>
