<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create account — Aperture</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="card bg-base-100 shadow-xl w-full max-w-sm">
    <div class="card-body">
      <h1 class="card-title text-2xl">Create account</h1>
      <form id="register-form" class="mt-2 space-y-3">
        <div>
          <label class="label" for="fullname">Full name</label>
          <input id="fullname" name="fullname" type="text" class="input w-full" required maxlength="255">
        </div>
        <div>
          <label class="label" for="email">Email</label>
          <input id="email" name="email" type="email" class="input w-full" required autocomplete="email">
        </div>
        <div>
          <label class="label" for="password">Password</label>
          <input id="password" name="password" type="password" class="input w-full" required
                 minlength="8" maxlength="128" autocomplete="new-password">
          <p class="text-xs opacity-70 mt-1">At least 8 characters, one number, one special character.</p>
        </div>
        <div>
          <label class="label" for="confirm">Confirm password</label>
          <input id="confirm" name="confirm" type="password" class="input w-full" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary w-full">Create account</button>
      </form>
      <p class="mt-2 text-sm">Already have an account? <a class="link" href="index.html">Sign in</a></p>
    </div>
  </div>
  <script type="module" src="js/register.js"></script>
</body>
</html>
