<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <title>Emergency contacts — Aperture</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body class="min-h-screen bg-base-200">
  <header data-nav></header>
  <main class="mx-auto max-w-5xl p-4 space-y-4">
    <div class="flex items-center justify-between flex-wrap gap-2">
      <h1 class="text-2xl font-bold">Emergency contacts</h1>
      <button id="add" class="btn btn-primary" data-icon="plus">Add contact</button>
    </div>

    <div class="alert">
      <span>When an emergency recording's countdown expires, every contact below receives an
      email with the live stream link.</span>
    </div>

    <div class="card bg-base-100 shadow">
      <div class="card-body p-0">
        <table class="table">
          <thead><tr><th>Name</th><th>Email</th><th>Custom message</th><th></th></tr></thead>
          <tbody id="rows">
            <tr><td colspan="4" class="text-center p-6"><span class="loading loading-spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <dialog id="contact-dialog" class="modal">
    <div class="modal-box">
      <h2 id="dialog-title" class="text-lg font-bold">Add contact</h2>
      <form id="contact-form" class="mt-3 space-y-3">
        <div>
          <label class="label" for="name">Name</label>
          <input id="name" name="name" type="text" class="input w-full" required maxlength="120" autocomplete="name">
        </div>
        <div>
          <label class="label" for="email">Email</label>
          <input id="email" name="email" type="email" class="input w-full" required maxlength="255" autocomplete="email">
        </div>
        <div>
          <label class="label" for="messageOverride">Custom alert message (optional)</label>
          <textarea id="messageOverride" name="messageOverride" class="textarea w-full" rows="3"
                    maxlength="2000" placeholder="Leave empty to use your default alert message"></textarea>
        </div>
        <div class="modal-action">
          <button type="button" class="btn" data-close>Cancel</button>
          <button type="submit" class="btn btn-primary" data-icon="check">Save</button>
        </div>
      </form>
    </div>
  </dialog>

  <script type="module" src="js/contacts.js"></script>
</body>
</html>
