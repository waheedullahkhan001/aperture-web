<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password — Aperture</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="card bg-base-100 shadow-xl w-full max-w-sm">
    <div class="card-body">
      <h1 class="card-title text-2xl">Reset password</h1>

      <form id="request-form" class="mt-2 space-y-3">
        <div>
          <label class="label" for="email">Email</label>
          <input id="email" name="email" type="email" class="input w-full" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary w-full">Send reset code</button>
      </form>

      <form id="confirm-form" class="mt-2 space-y-3 hidden">
        <p class="text-sm opacity-70">If that address exists, a reset code is on its way.</p>
        <div>
          <label class="label" for="code">Reset code</label>
          <input id="code" name="code" type="text" inputmode="numeric" class="input w-full" required autocomplete="one-time-code">
        </div>
        <div>
          <label class="label" for="newPassword">New password</label>
          <input id="newPassword" name="newPassword" type="password" class="input w-full" required
                 minlength="8" maxlength="128" autocomplete="new-password">
          <p class="text-xs opacity-70 mt-1">At least 8 characters, one number, one special character.</p>
        </div>
        <button type="submit" class="btn btn-primary w-full">Set new password</button>
      </form>

      <p class="mt-2 text-sm"><a class="link" href="index.html">Back to sign in</a></p>
    </div>
  </div>
  <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
