<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify email — Aperture</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="card bg-base-100 shadow-xl w-full max-w-sm">
    <div class="card-body">
      <h1 class="card-title text-2xl">Verify your email</h1>
      <p class="text-sm opacity-70">We sent a verification code to your email address.</p>
      <form id="verify-form" class="mt-2 space-y-3">
        <div>
          <label class="label" for="email">Email</label>
          <input id="email" name="email" type="email" class="input w-full" required>
        </div>
        <div>
          <label class="label" for="code">Verification code</label>
          <input id="code" name="code" type="text" inputmode="numeric" class="input w-full" required>
        </div>
        <button type="submit" class="btn btn-primary w-full">Verify</button>
      </form>
      <button id="resend" class="btn btn-ghost btn-sm mt-1">Resend code</button>
      <p class="mt-2 text-sm"><a class="link" href="index.html">Back to sign in</a></p>
    </div>
  </div>
  <script type="module" src="js/verify-email.js"></script>
</body>
</html>
